<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Ofertas - CEDERJ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f7fc; padding: 30px; }
        h1 { color: #1a3a5c; text-align: center; margin-bottom: 10px; }
        .subtitulo { text-align: center; color: #4a627a; margin-bottom: 30px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .card h3 { color: #1a3a5c; margin-bottom: 8px; }
        .card p { color: #6b7280; font-size: 13px; }
        .badge { display: inline-block; background: #e0e7ff; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-top: 10px; }
        .contador { text-align: center; margin-top: 30px; color: #6b7280; font-size: 13px; }
        .filtro { margin-bottom: 20px; text-align: center; }
        .filtro input { padding: 8px 15px; width: 300px; border-radius: 20px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        .filtro input:focus { border-color: #1a3a5c; }
        @media (max-width: 640px) {
            body { padding: 15px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>🎓 Gestão de Oferta de Disciplinas</h1>
    <div class="subtitulo">Cursos de graduação a distância - Universidades consorciadas CEDERJ</div>
    
    <div class="filtro">
        <input type="text" id="busca" placeholder="🔍 Buscar curso ou instituição..." onkeyup="filtrarCursos()">
    </div>
    
    <div class="grid" id="cursos-grid"></div>
    <div class="contador" id="contador"></div>

    <script>
        // Array COMPLETO com TODOS os 28 cursos
        const cursos = [
            { nome: "Administração", instituicao: "UFRRJ", arquivo: "cursos/adm-ufrrj.html", polos: 18 },
            { nome: "Administração Pública", instituicao: "UFF", arquivo: "cursos/apu-uff.html", polos: 9 },
            { nome: "Biblioteconomia", instituicao: "UFF", arquivo: "cursos/bib-uff.html", polos: 5 },
            { nome: "Biblioteconomia", instituicao: "UNIRIO", arquivo: "cursos/bib-unirio.html", polos: 7 },
            { nome: "Ciências Biológicas", instituicao: "UENF", arquivo: "cursos/bio-uenf.html", polos: 8 },
            { nome: "Ciências Biológicas", instituicao: "UERJ", arquivo: "cursos/bio-uerj.html", polos: 6 },
            { nome: "Ciências Biológicas", instituicao: "UFRJ", arquivo: "cursos/bio-ufrj.html", polos: 7 },
            { nome: "Ciências Contábeis", instituicao: "UFF", arquivo: "cursos/cco-uff.html", polos: 7 },
            { nome: "Ciências Contábeis", instituicao: "UFRJ", arquivo: "cursos/cco-ufrj.html", polos: 7 },
            { nome: "Computação", instituicao: "UFF", arquivo: "cursos/com-uff.html", polos: 19 },
            { nome: "Design Gráfico", instituicao: "IFF", arquivo: "cursos/dgr-iff.html", polos: 4 },
            { nome: "Engenharia de Produção", instituicao: "UFF", arquivo: "cursos/epr-uff.html", polos: 5 },
            { nome: "Engenharia Meteorológica", instituicao: "UENF", arquivo: "cursos/eme-uenf.html", polos: 1 },
            { nome: "Física", instituicao: "UFRJ", arquivo: "cursos/fis-ufrj.html", polos: 10 },
            { nome: "Geografia", instituicao: "UERJ", arquivo: "cursos/geo-uerj.html", polos: 11 },
            { nome: "Gestão de Turismo", instituicao: "CEFET-RJ", arquivo: "cursos/tgt-cefet.html", polos: 7 },
            { nome: "História", instituicao: "UNIRIO", arquivo: "cursos/his-unirio.html", polos: 5 },
            { nome: "Letras", instituicao: "UFF", arquivo: "cursos/let-uff.html", polos: 6 },
            { nome: "Licenciatura em Administração", instituicao: "UFRRJ", arquivo: "cursos/adl-ufrrj.html", polos: 8 },
            { nome: "Licenciatura em Pedagogia", instituicao: "UENF", arquivo: "cursos/pli-uenf.html", polos: 8 },
            { nome: "Licenciatura em Pedagogia", instituicao: "UERJ", arquivo: "cursos/pli-uerj.html", polos: 14 },
            { nome: "Licenciatura em Pedagogia", instituicao: "UNIRIO", arquivo: "cursos/pli-unirio.html", polos: 12 },
            { nome: "Matemática", instituicao: "UFF", arquivo: "cursos/mat-uff.html", polos: 17 },
            { nome: "Química", instituicao: "UENF", arquivo: "cursos/qui-uenf.html", polos: 5 },
            { nome: "Química", instituicao: "UFRJ", arquivo: "cursos/qui-ufrj.html", polos: 5 },
            { nome: "Segurança Pública", instituicao: "UFF", arquivo: "cursos/spu-uff.html", polos: 12 },
            { nome: "Turismo", instituicao: "UFRRJ", arquivo: "cursos/tur-ufrrj.html", polos: 5 },
            { nome: "Turismo", instituicao: "UNIRIO", arquivo: "cursos/tur-unirio.html", polos: 5 }
        ];

        const grid = document.getElementById('cursos-grid');
        const contador = document.getElementById('contador');

        function renderizarCursos(cursosFiltrados) {
            grid.innerHTML = '';
            cursosFiltrados.forEach(curso => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => location.href = curso.arquivo;

                card.innerHTML = `
                    <h3>${curso.nome}</h3>
                    <p>${curso.instituicao}</p>
                    <span class="badge">${curso.polos} polos</span>
                `;
                grid.appendChild(card);
            });
            // CORRIGIDO: "ofertas de cursos" em vez de "disciplinas"
            contador.textContent = `📊 Total: ${cursosFiltrados.length} oferta${cursosFiltrados.length !== 1 ? 's' : ''} de cursos`;
        }

        function filtrarCursos() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = cursos.filter(curso => 
                curso.nome.toLowerCase().includes(termo) || 
                curso.instituicao.toLowerCase().includes(termo)
            );
            renderizarCursos(filtrados);
        }

        // Renderiza todos inicialmente
        renderizarCursos(cursos);
    </script>
</body>
</html>
