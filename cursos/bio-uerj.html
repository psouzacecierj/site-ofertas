<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão de Oferta - Ciências Biológicas UERJ 1/2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
            color: #1a2c3e;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #1a3a4f;
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .header p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }
        .badge {
            background: #2d6a4f;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .summary {
            background: #f8fafc;
            padding: 10px 24px;
            display: flex;
            gap: 28px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }
        .dot-active { background: #2e7d32; }
        .dot-inactive { background: #bdbdbd; }
        .stat-label {
            font-size: 0.7rem;
            color: #54708f;
        }
        .stat-value {
            font-weight: 700;
            font-size: 0.9rem;
            color: #1a2c3e;
        }

        .filters {
            padding: 12px 24px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters input, .filters select {
            padding: 7px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 0.75rem;
            background: white;
        }
        .filters input {
            width: 240px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-primary {
            background: #1a3a4f;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.75rem;
        }
        .btn-primary:hover {
            background: #0f2c3c;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 0 0 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.73rem;
            min-width: 1100px;
            background: white;
        }
        th {
            background: #f1f5f9;
            color: #1e3a5f;
            padding: 10px 6px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid #cbd5e1;
            border-right: 1px solid #e2e8f0;
        }
        td {
            padding: 8px 5px;
            border-bottom: 1px solid #eef2f5;
            border-right: 1px solid #eef2f5;
            vertical-align: middle;
        }
        .period-cell {
            text-align: center;
            font-weight: 600;
            background-color: #fafcff;
        }
        .codigo {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            color: #1e4663;
            white-space: nowrap;
            font-size: 0.7rem;
        }
        .disciplina-nome {
            font-weight: 500;
            min-width: 220px;
            color: #0f2b3b;
        }
        .ch {
            text-align: center;
            font-weight: 500;
            background-color: #fefce8;
        }
        .offer-cell {
            text-align: center;
            cursor: pointer;
            background-color: white;
            transition: all 0.05s linear;
        }
        .check-green {
            color: #2e7d32;
            font-weight: 700;
        }
        .action-btn {
            padding: 5px 10px;
            border-radius: 20px;
            border: none;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            background: #eef2ff;
            color: #1e3a5f;
            transition: 0.1s;
            white-space: nowrap;
        }
        .action-btn:hover {
            background: #d9e4f5;
        }
        .section-header td {
            background-color: #f8fafc;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 8px 16px;
            color: #1a3a4f;
            border-bottom: 1px solid #cbd5e1;
        }
        .footer-buttons {
            padding: 14px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            background: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            padding: 22px;
        }
        .modal-content textarea {
            width: 100%;
            height: 260px;
            font-family: monospace;
            margin: 14px 0;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 0.7rem;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        @media (max-width: 780px) {
            body { padding: 12px; }
        }
    </style>
</head>

<div class="container">
    <div class="header">
        <div>
            <h1>🌿 Gestão de Oferta de Disciplinas</h1>
            <p>Ciências Biológicas - UERJ - Consórcio EAD | 1º semestre / 2026</p>
        </div>
        <div class="badge">✔️ Controle de oferta por polo</div>
    </div>

    <div class="summary">
        <div class="stat"><div class="stat-dot dot-active"></div><span class="stat-label">Com oferta (✓)</span><span class="stat-value" id="activeCount">0</span></div>
        <div class="stat"><div class="stat-dot dot-inactive"></div><span class="stat-label">Sem oferta (vazio)</span><span class="stat-value" id="inactiveCount">0</span></div>
        <div class="stat" style="margin-left: auto;"><span class="stat-label">Total disciplinas:</span><span class="stat-value" id="totalDisc">0</span></div>
    </div>

    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Buscar disciplina ou código..." autocomplete="off">
        <select id="periodFilter">
            <option value="">Todos os períodos</option>
            <option value="01">Período 01</option>
            <option value="02">Período 02</option>
            <option value="03">Período 03</option>
            <option value="04">Período 04</option>
            <option value="05">Período 05</option>
            <option value="06">Período 06</option>
            <option value="07">Período 07</option>
            <option value="08">Período 08</option>
            <option value="09">Período 09</option>
            <option value="10">Período 10</option>
            <option value="Outros">Optativas / Outros</option>
        </select>
        <select id="statusFilter">
            <option value="">Todos os status</option>
            <option value="active">Com oferta (✓)</option>
            <option value="inactive">Sem oferta (vazio)</option>
        </select>
        <button class="btn-outline" id="resetFiltersBtn">Limpar filtros</button>
        <button class="btn-primary" id="exportBtn">📋 Exportar alterações</button>
    </div>

    <div class="table-wrapper">
        <table id="offerTable">
            <thead>
                <tr><th>Período</th><th>Código</th><th style="text-align:left">Disciplina</th><th>CH</th><th>BRO</th><th>MAG</th><th>NFR</th><th>PAR</th><th>RES</th><th>SPE</th><th>Ações</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="footer-buttons">
        <button class="btn-outline" id="saveChangesBtn">💾 Salvar estado (localStorage)</button>
        <button class="btn-outline" id="resetAllOffersBtn">🔄 Resetar ofertas (original planilha)</button>
    </div>
</div>

<div id="exportModal" class="modal">
    <div class="modal-content">
        <h3>📄 Alterações realizadas na oferta</h3>
        <textarea id="exportData" readonly></textarea>
        <div class="modal-actions">
            <button class="btn-outline" id="copyExportBtn">Copiar</button>
            <button class="btn-primary" id="closeModalBtn">Fechar</button>
        </div>
    </div>
</div>

        {per:"Outros",cod:"EAD02026",nome:"Instrumentação para o Ensino de Genética",ch:45, base:{BRO:"UENF",MAG:"UENF",NFR:"UENF",PAR:"UENF",RES:"UENF",SPE:"UENF"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},

        {per:"Outros",cod:"EAD02033",nome:"Elementos de Química Geral",ch:75, base:{BRO:"UFRJ",MAG:"UFRJ",NFR:"UFRJ",PAR:"UFRJ",RES:"UFRJ",SPE:"UFRJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02034",nome:"Instrumentação para o Ensino de Zoologia, Botânica e Ecologia",ch:45, base:{BRO:"UERJ",MAG:"UERJ",NFR:"UERJ",PAR:"UERJ",RES:"UERJ",SPE:"UERJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02036",nome:"Corpo Humano II",ch:75, base:{BRO:"UERJ",MAG:"UERJ",NFR:"UERJ",PAR:"UERJ",RES:"UERJ",SPE:"UERJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02037",nome:"Biofísica",ch:45, base:{BRO:"UFRJ",MAG:"UFRJ",NFR:"UFRJ",PAR:"UFRJ",RES:"UFRJ",SPE:"UFRJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02038",nome:"Microbiologia",ch:60, base:{BRO:"UFRJ",MAG:"UFRJ",NFR:"UFRJ",PAR:"UFRJ",RES:"UFRJ",SPE:"UFRJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02039",nome:"Imunologia",ch:45, base:{BRO:"UENF",MAG:"UENF",NFR:"UENF",PAR:"UENF",RES:"UENF",SPE:"UENF"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02040",nome:"Educação em Saúde",ch:45, base:{BRO:"UERJ",MAG:"UERJ",NFR:"UERJ",PAR:"UERJ",RES:"UERJ",SPE:"UERJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02041",nome:"Instrumentação para o Ensino de Ciências",ch:45, base:{BRO:"UERJ",MAG:"UERJ",NFR:"UERJ",PAR:"UERJ",RES:"UERJ",SPE:"UERJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}},
        {per:"Outros",cod:"EAD02044",nome:"Educação Ambiental",ch:60, base:{BRO:"UFRJ",MAG:"UFRJ",NFR:"UFRJ",PAR:"UFRJ",RES:"UFRJ",SPE:"UFRJ"}, status:{BRO:"Desativa",MAG:"Ativa",NFR:"Ativa",PAR:"Ativa",RES:"Ativa",SPE:"Desativa"}}
    ];

    const polos = ['BRO', 'MAG', 'NFR', 'PAR', 'RES', 'SPE'];
    let offerState = {};

    function initState() {
        disciplinasData.forEach(d => {
            polos.forEach(polo => {
                const key = `${d.cod}_${polo}`;
                offerState[key] = (d.status[polo] === 'Ativa');
            });
        });
        const saved = localStorage.getItem('bio_offer_state_v2');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                Object.assign(offerState, parsed);
            } catch(e) {}
        }
    }

    function saveToLocal() {
        localStorage.setItem('bio_offer_state_v2', JSON.stringify(offerState));
    }

    function getOfferText(d, polo) {
        const key = `${d.cod}_${polo}`;
        if (offerState[key]) {
            return `<span class="check-green">✓ ${d.base[polo]}</span>`;
        }
        return '';
    }

    function toggleOffer(d, polo) {
        const key = `${d.cod}_${polo}`;
        offerState[key] = !offerState[key];
        saveToLocal();
        renderTable();
    }

    function toggleAllForDiscipline(d) {
        const anyActive = polos.some(p => offerState[`${d.cod}_${p}`]);
        polos.forEach(polo => {
            const key = `${d.cod}_${polo}`;
            offerState[key] = !anyActive;
        });
        saveToLocal();
        renderTable();
    }

    function resetAllToOriginal() {
        disciplinasData.forEach(d => {
            polos.forEach(polo => {
                const key = `${d.cod}_${polo}`;
                offerState[key] = (d.status[polo] === 'Ativa');
            });
        });
        saveToLocal();
        renderTable();
    }

    function computeStats() {
        let active = 0, inactive = 0;
        disciplinasData.forEach(d => {
            polos.forEach(polo => {
                if (offerState[`${d.cod}_${polo}`]) active++;
                else inactive++;
            });
        });
        document.getElementById('activeCount').innerText = active;
        document.getElementById('inactiveCount').innerText = inactive;
        document.getElementById('totalDisc').innerText = disciplinasData.length;
    }

    function renderTable() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const periodVal = document.getElementById('periodFilter').value;
        const statusVal = document.getElementById('statusFilter').value;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let lastPeriod = null;

        const filtered = disciplinasData.filter(d => {
            if (searchTerm && !d.nome.toLowerCase().includes(searchTerm) && !d.cod.toLowerCase().includes(searchTerm)) return false;
            if (periodVal) {
                if (periodVal === 'Outros' && d.per !== 'Outros') return false;
                if (periodVal !== 'Outros' && d.per !== periodVal) return false;
            }
            if (statusVal === 'active') {
                return polos.some(p => offerState[`${d.cod}_${p}`]);
            }
            if (statusVal === 'inactive') {
                return polos.some(p => !offerState[`${d.cod}_${p}`]);
            }
            return true;
        });

        filtered.forEach(d => {
            if (d.per !== lastPeriod) {
                const sectionRow = document.createElement('tr');
                sectionRow.className = 'section-header';
                const displayPeriod = d.per === 'Outros' ? '📘 Disciplinas Optativas / Outros' : `📌 Período ${d.per}`;
                sectionRow.innerHTML = `<td colspan="11"><strong>${displayPeriod}</strong></td>`;
                tbody.appendChild(sectionRow);
                lastPeriod = d.per;
            }

            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = d.per === 'Outros' ? '—' : `<span class="period-cell">${d.per}</span>`;
            row.insertCell(1).innerHTML = `<span class="codigo">${d.cod}</span>`;
            row.insertCell(2).innerHTML = `<span class="disciplina-nome">${d.nome}</span>`;
            row.insertCell(3).innerHTML = `<span class="ch">${d.ch}h</span>`;

            polos.forEach(polo => {
                const cell = row.insertCell();
                cell.className = 'offer-cell';
                const isActive = offerState[`${d.cod}_${polo}`];
                cell.innerHTML = isActive ? `<span class="check-green">✓ ${d.base[polo]}</span>` : '';
                cell.style.cursor = 'pointer';
                cell.onclick = (function(discipl, p) { return function() { toggleOffer(discipl, p); }; })(d, polo);
            });

            const actionCell = row.insertCell();
            actionCell.style.textAlign = 'center';
            const anyActive = polos.some(p => offerState[`${d.cod}_${p}`]);
            const btnText = anyActive ? '❌ Desativar todos' : '✅ Ativar todos';
            const btn = document.createElement('button');
            btn.innerText = btnText;
            btn.className = 'action-btn';
            btn.onclick = () => toggleAllForDiscipline(d);
            actionCell.appendChild(btn);
        });
        computeStats();
    }

    function exportChanges() {
        const changes = [];
        disciplinasData.forEach(d => {
            const inactivePolos = polos.filter(p => !offerState[`${d.cod}_${p}`]);
            if (inactivePolos.length > 0) {
                changes.push(`[${d.per}] ${d.cod} — ${d.nome}`);
                inactivePolos.forEach(p => changes.push(`  ✗ Polo ${p}: oferta REMOVIDA (vazio)`));
                changes.push('');
            }
        });
        if (changes.length === 0) changes.push('Nenhuma alteração — todas as ofertas seguem o padrão original.');
        document.getElementById('exportData').value = changes.join('\n');
        document.getElementById('exportModal').style.display = 'flex';
    }

    initState();
    renderTable();

    document.getElementById('searchInput').addEventListener('input', () => renderTable());
    document.getElementById('periodFilter').addEventListener('change', () => renderTable());
    document.getElementById('statusFilter').addEventListener('change', () => renderTable());
    document.getElementById('resetFiltersBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('periodFilter').value = '';
        document.getElementById('statusFilter').value = '';
        renderTable();
    });
    document.getElementById('exportBtn').addEventListener('click', exportChanges);
    document.getElementById('saveChangesBtn').addEventListener('click', () => {
        saveToLocal();
        alert('✅ Configuração salva no navegador!');
    });
    document.getElementById('resetAllOffersBtn').addEventListener('click', () => {
        if (confirm('⚠️ Restaurar todas as ofertas para o estado original da planilha?')) resetAllToOriginal();
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('exportModal').style.display = 'none');
    document.getElementById('copyExportBtn').addEventListener('click', () => {
        const textarea = document.getElementById('exportData');
        textarea.select();
        document.execCommand('copy');
        alert('Copiado!');
    });
    window.onclick = (e) => { if (e.target === document.getElementById('exportModal')) document.getElementById('exportModal').style.display = 'none'; };
</script>
