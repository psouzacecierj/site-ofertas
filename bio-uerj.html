// Estado inicial: se inst estiver vazio -> inactive; se tiver conteúdo -> active
const state = {};
DISCIPLINAS.forEach((d, idx) => {
    POLOS.forEach(p => {
        const inst = d.inst[p];
        state[`${idx}_${p}`] = (inst && inst !== '') ? 'active' : 'inactive';
    });
});

let validado = localStorage.getItem('validado_bio_uerj') === 'true';

function atualizarValidacaoBox() {
    const box = document.getElementById('validacao-box');
    const span = document.getElementById('status-validacao');
    if (validado) {
        box.classList.add('validacao-ok');
        span.innerHTML = '✅ Já validado';
    } else {
        box.classList.remove('validacao-ok');
        span.innerHTML = '⚠️ Clique em "Validar" após conferir';
    }
}

function conferirValidar() {
    localStorage.setItem('validado_bio_uerj', 'true');
    validado = true;
    atualizarValidacaoBox();
    alert('✓ Validação registrada!');
}

function togglePolo(idx, polo) {
    const key = `${idx}_${polo}`;
    const current = state[key];
    if (current === 'active') state[key] = 'inactive';
    else if (current === 'inactive') state[key] = 'active';
    render();
}

function toggleAll(idx) {
    const todasAtivas = POLOS.every(p => state[`${idx}_${p}`] === 'active');
    const novoStatus = todasAtivas ? 'inactive' : 'active';
    POLOS.forEach(p => { state[`${idx}_${p}`] = novoStatus; });
    render();
}

function salvarAlteracoes() {
    let alteracoes = [];
    let temAlteracao = false;
    DISCIPLINAS.forEach((d, idx) => {
        POLOS.forEach(p => {
            if (state[`${idx}_${p}`] !== 'active') {
                temAlteracao = true;
                const inst = d.inst[p];
                alteracoes.push(`[${d.per}] ${d.cod} - ${d.nome} - Polo ${p}: ${state[`${idx}_${p}`] === 'inactive' ? 'REMOVER oferta' : 'INCLUIR oferta'} (${inst || 'em branco'})`);
            }
        });
    });
    if (!temAlteracao && !validado) {
        alert('Nenhuma alteração detectada. Clique em "Validar" para registrar que você verificou.');
        return;
    }
    const csvContent = alteracoes.join('\n');
    const blob = new Blob([csvContent], {type: 'text/csv'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `alteracoes_bio_uerj.csv`;
    link.click();
    alert('Arquivo gerado! Envie para matrizes.cederj@gmail.com');
}

function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const filterPer = document.getElementById('filter-periodo').value;
    let activeCount = 0, inactiveCount = 0;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    let lastPer = null;
    
    let disciplinasFiltradas = DISCIPLINAS;
    if (filterPer === 'Outros') {
        disciplinasFiltradas = DISCIPLINAS.filter(d => d.per === 'Outros');
    } else if (filterPer) {
        disciplinasFiltradas = DISCIPLINAS.filter(d => d.per === filterPer);
    }
    
    disciplinasFiltradas.forEach((d, idx) => {
        if (search && !d.nome.toLowerCase().includes(search) && !d.cod.toLowerCase().includes(search)) return;
        
        if (d.per !== lastPer) {
            const hr = document.createElement('tr');
            hr.className = 'section-header';
            const perLabel = d.per === 'Outros' ? '📖 Disciplinas Optativas / Eletivas / Outros' : `Período ${d.per}`;
            hr.innerHTML = `<td colspan="${3 + POLOS.length + 2}"><strong>${perLabel}</strong></td>`;
            tbody.appendChild(hr);
            lastPer = d.per;
        }
        
        const tr = document.createElement('tr');
        let poloCells = '';
        POLOS.forEach(p => {
            const status = state[`${idx}_${p}`];
            const inst = d.inst[p];
            const cls = status === 'active' ? 'polo-active' : 'polo-inactive';
            // TEXTO ALTERADO: "⬜ Sem oferta" para células inativas
            const txt = status === 'active' ? `✅ ${inst}` : `⬜ Sem oferta`;
            poloCells += `<td class="polo-cell" onclick="togglePolo(${idx}, '${p}')"><span class="${cls}">${txt}</span></td>`;
            if (status === 'active') activeCount++; else inactiveCount++;
        });
        tr.innerHTML = `<td>${d.per !== 'Outros' ? d.per : 'Opt'}</td><td><code>${d.cod}</code></td><td>${d.nome}</td><td class="center">${d.ch}h</td>${poloCells}</td><button class="toggle-all-btn" onclick="toggleAll(${idx})">✗ Desativar tudo</button></td>`;
        tbody.appendChild(tr);
    });
    document.getElementById('count-active').textContent = activeCount;
    document.getElementById('count-inactive').textContent = inactiveCount;
}

function resetFilters() {
    document.getElementById('search').value = '';
    document.getElementById('filter-periodo').value = '';
    render();
}

atualizarValidacaoBox();
render();
</script>
</body>
</html>
